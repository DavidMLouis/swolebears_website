{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Swolé Bears | Protein Gummy Bears for Active Lifestyles{% endblock %}</title>
    
    <!-- SEO & Meta Tags -->
    <meta name="description" content="{% block meta_description %}Join the Swolé List for first access to protein gummy bears built for convenience, taste, and your active lifestyle.{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Swolé Bears | Protein Gummy Bears">
    <meta property="og:description" content="Candy Energy. Protein Purpose. Get first access.">
    <!-- PLACEHOLDER: Ensure og:image exists in static folder before launch -->
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/og-image-placeholder.jpg' %}">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <!-- PLACEHOLDER: Update with real handle -->
    <meta name="twitter:site" content="@swolebears">
    <meta name="twitter:title" content="Swolé Bears | Protein Gummy Bears">
    <meta name="twitter:description" content="Candy Energy. Protein Purpose. Get first access.">
    <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/twitter-card-placeholder.jpg' %}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">

    <!-- Tailwind Play CDN Setup (Starter Config) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#E21E26',
                            dark: '#111111',
                            cream: '#F8E8E8',
                            gray: '#222222'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- Third-Party Placeholders -->
    <!-- Google Analytics Placeholder -->
    <!-- Meta Pixel Placeholder -->
</head>
<body class="bg-brand-dark text-white antialiased font-sans selection:bg-brand-red selection:text-white flex flex-col min-h-screen">
    
    <!-- CSRF Token for external JS to fetch -->
    {% csrf_token %}

    <!-- Header / Nav -->
    <header class="fixed w-full z-50 bg-brand-dark/90 backdrop-blur-md border-b border-white/5 py-4 transition-all">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 relative group">
                <!-- PLACEHOLDER: Ensure logo exists -->
                <img src="{% static 'images/Swole_Bears_RGB_Logomark.png' %}" alt="Swolé Bears" class="h-8 md:h-10 hover:scale-105 transition-transform">
                <span class="sr-only">Swolé Bears</span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a href="#why-it-stands-out" class="text-sm font-semibold text-gray-300 hover:text-white transition-colors">The Gummies</a>
                <a href="#founder-story" class="text-sm font-semibold text-gray-300 hover:text-white transition-colors">Our Story</a>
                <a href="#faq" class="text-sm font-semibold text-gray-300 hover:text-white transition-colors">FAQ</a>
            </nav>
            <a href="#hero-form" data-source="header_nav" class="bg-brand-red hover:bg-red-700 text-white font-bold py-2.5 px-6 rounded-full text-sm shadow-lg gummy-glow transition-all active:scale-95">
                Get First Access
            </a>
        </div>
    </header>

    <main class="flex-grow pt-24">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    
    <!-- Sticky Mobile CTA -->
    <div id="sticky-cta" class="fixed bottom-0 left-0 w-full z-40 bg-brand-dark/95 backdrop-blur border-t border-brand-red/20 p-4 transform translate-y-full transition-transform md:hidden shadow-[0_-10px_40px_rgba(226,30,38,0.15)] flex justify-center items-center">
        <a href="#hero-form" data-source="sticky_cta" class="w-full text-center bg-brand-red hover:bg-red-700 text-white font-bold py-4 rounded-xl text-lg gummy-glow">
            Get Early Access
        </a>
    </div>

    <script src="{% static 'js/main.js' %}?v=1.1" defer></script>
</body>
</html>
